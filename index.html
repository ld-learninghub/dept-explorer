let activeDept=null,panelDept=null,playAllMode=false,muted=false,lastDebugCode=''; const completed=new Set(); panel.style.left=PANEL.left; panel.style.top=PANEL.top; panel.style.width=PANEL.width; panel.style.height=PANEL.height;
function svgEl(name){return document.createElementNS('http://www.w3.org/2000/svg',name)}
function ensureDefs(){const defs=svgEl('defs'); zoneSvg.appendChild(defs); const mask=svgEl('mask'); mask.id='dim-mask'; mask.setAttribute('maskUnits','userSpaceOnUse'); mask.setAttribute('x','0');mask.setAttribute('y','0');mask.setAttribute('width','100');mask.setAttribute('height','100'); const bg=svgEl('rect'); bg.setAttribute('x','0');bg.setAttribute('y','0');bg.setAttribute('width','100');bg.setAttribute('height','100');bg.setAttribute('fill','#fff'); mask.appendChild(bg); defs.appendChild(mask); ['room','quadrant'].forEach((kind)=>{const filter=svgEl('filter');filter.id='soft-'+kind+'-edge';filter.setAttribute('x','-45%');filter.setAttribute('y','-45%');filter.setAttribute('width','190%');filter.setAttribute('height','190%');const blur=svgEl('feGaussianBlur');blur.setAttribute('stdDeviation',kind==='room'?3.15:3.45);filter.appendChild(blur);defs.appendChild(filter);})}
function ensureGradient(group){let id='grad-'+group;if(document.getElementById(id))return id;const defs=zoneSvg.querySelector('defs');const grad=svgEl('radialGradient');grad.id=id;[[0,.42],[58,.25],[86,.08],[100,0]].forEach(([off,op])=>{const s=svgEl('stop');s.setAttribute('offset',off+'%');s.setAttribute('stop-color',GROUP_HALO[group]);s.setAttribute('stop-opacity',op);grad.appendChild(s);});defs.appendChild(grad);return id;}
function ellipseShape(d,cls,fill){const e=svgEl('ellipse');e.setAttribute('class',cls);e.setAttribute('cx',d.cx);e.setAttribute('cy',d.cy);e.setAttribute('rx',d.rx);e.setAttribute('ry',d.ry);if(fill)e.setAttribute('fill',fill);return e;}
function hitEllipseShape(d,cls,fill){const e=svgEl('ellipse');e.setAttribute('class',cls);e.setAttribute('cx',d.hitCx??d.cx);e.setAttribute('cy',d.hitCy??d.cy);e.setAttribute('rx',d.hitRx??d.rx);e.setAttribute('ry',d.hitRy??d.ry);if(fill)e.setAttribute('fill',fill);return e;}
function setMaskClass(id,type,classes){const el=document.getElementById('mask-'+type+'-'+id); if(!el)return; el.setAttribute('class',(type==='room'?'mask-room':'mask-quadrant')+(classes?' '+classes:''));}
function buildZones(){ensureDefs(); const mask=document.getElementById('dim-mask'); GROUP_AREAS.forEach(a=>{const s=ellipseShape(a,'mask-quadrant','#000');s.id='mask-quadrant-'+a.group;s.setAttribute('filter','url(#soft-quadrant-edge)');mask.appendChild(s);}); DEPARTMENTS.forEach(d=>{const ms=ellipseShape(d,'mask-room','#000');ms.id='mask-room-'+d.id;ms.setAttribute('filter','url(#soft-room-edge)');mask.appendChild(ms);}); const dim=svgEl('rect');dim.setAttribute('class','zone-global-dim');dim.setAttribute('x','0');dim.setAttribute('y','0');dim.setAttribute('width','100');dim.setAttribute('height','100');dim.setAttribute('mask','url(#dim-mask)');zoneSvg.appendChild(dim);
DEPARTMENTS.forEach(d=>{const g=svgEl('g');g.id='zone-'+d.id;g.setAttribute('class','zone');g.style.setProperty('--gcolor',GROUP_COLORS[d.group]);g.style.pointerEvents='auto';const grad=ensureGradient(d.group);const glow=ellipseShape(d,'zone-glow','url(#'+grad+')');const hit=hitEllipseShape(d,'zone-hit','transparent');g.appendChild(glow);g.appendChild(hit);zoneSvg.appendChild(g); const row=document.createElement('div');row.className='info-row';row.id='info-'+d.id;row.style.setProperty('--gcolor',GROUP_COLORS[d.group]);row.style.left=(d.labelX??d.cx)+'%';row.style.top=d.labelY+'%';const marker=document.createElement('div');marker.className='state-marker';marker.innerHTML='<svg class="speaker-icon" viewBox="0 0 24 24" aria-hidden="true"><polygon points="4,10 8,10 13,6 13,18 8,14 4,14"></polygon><path d="M16 9.5c1.2 1.4 1.2 3.6 0 5"></path><path d="M18.5 7c2.3 2.7 2.3 7.3 0 10"></path></svg><svg class="check-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12l5 5 11-11"/></svg>';row.appendChild(marker);const label=document.createElement('div');label.className='label';label.textContent=d.label;row.appendChild(label);markers.appendChild(row); const enter=()=>{g.classList.add('hover');row.classList.add('hover');if(!g.classList.contains('active')&&!g.classList.contains('completed'))setMaskClass(d.id,'room','hover');}; const leave=()=>{g.classList.remove('hover');row.classList.remove('hover');if(!g.classList.contains('active')&&!g.classList.contains('completed'))setMaskClass(d.id,'room','');}; [g,row].forEach(el=>{el.addEventListener('mouseenter',enter);el.addEventListener('mouseleave',leave);el.addEventListener('click',e=>{if(DEBUG_MODE){e.preventDefault();e.stopPropagation();updateDebugPoint(e);return;}e.stopPropagation();onBuildingClick(d);});});}); GROUP_BANNERS.forEach(b=>{const el=document.createElement('div');el.className='group-banner';el.innerHTML=GROUP_LABELS[b.group];el.style.setProperty('--bcolor',GROUP_COLORS[b.group]);el.style.left=b.left;el.style.top=b.top;banners.appendChild(el);});}
function escapeHTML(v){return String(v).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function renderDescription(desc){return (Array.isArray(desc)?desc:String(desc).split(/\n\s*\n/)).map(p=>String(p).trim()).filter(Boolean).map(p=>'<p>'+escapeHTML(p)+'</p>').join('');}
function showDefaultPanel(){panelDept=null;panel.classList.add('default');document.getElementById('panel-eyebrow').textContent=' ';document.getElementById('panel-eyebrow').style.color='transparent';document.getElementById('panel-title').textContent=DEFAULT_TITLE;document.getElementById('panel-desc').innerHTML=renderDescription(DEFAULT_DESC);updateNavButtons();}
function showPanel(d){panelDept=d;panel.classList.remove('default');document.getElementById('panel-eyebrow').textContent=GROUP_LABELS[d.group]||'';document.getElementById('panel-eyebrow').style.color=GROUP_COLORS[d.group];document.getElementById('panel-title').textContent=d.label;document.getElementById('panel-desc').innerHTML=renderDescription(d.description);updateNavButtons();}
function deptIndex(d){return DEPARTMENTS.findIndex(x=>x.id===(d&&d.id));}
function setZoneState(id,classes=[]){const z=document.getElementById('zone-'+id),r=document.getElementById('info-'+id);['active','completed'].forEach(c=>{z.classList.remove(c);r.classList.remove(c);});classes.forEach(c=>{z.classList.add(c);r.classList.add(c);});setMaskClass(id,'room',classes.join(' '));updateQuadrantOpenStates();}
function refreshStates(){DEPARTMENTS.forEach(d=>{const cls=[];if(completed.has(d.id))cls.push('completed');if(activeDept&&activeDept.id===d.id)cls.push('active');setZoneState(d.id,cls);});}
function updateQuadrantOpenStates(){const done={};GROUP_AREAS.forEach(a=>{const ids=DEPARTMENTS.filter(d=>d.group===a.group).map(d=>d.id);done[a.group]=ids.every(id=>completed.has(id));setMaskClass(a.group,'quadrant',done[a.group]?'open':'');});const all=GROUP_AREAS.every(a=>done[a.group]);scene.classList.toggle('all-complete',all);GROUP_AREAS.forEach(a=>{const s=document.getElementById('mask-quadrant-'+a.group);if(s){const scale=all?GROUP_AREAS_ALL_COMPLETE_SCALE:(done[a.group]?GROUP_AREAS_COMPLETED_SCALE:{rx:1,ry:1});s.setAttribute('rx',(a.rx*scale.rx).toFixed(2));s.setAttribute('ry',(a.ry*scale.ry).toFixed(2));}});}
function updateNavButtons(){const focus=activeDept||panelDept;const i=focus?deptIndex(focus):-1;prevBtn.disabled=i<=0;nextBtn.disabled=i<0||i>=DEPARTMENTS.length-1;}
function completeActiveKeepPanel(){
  if(!activeDept)return null;
  const finished=activeDept;
  completed.add(finished.id);
  audioEl.pause();
  audioEl.removeAttribute('src');
  audioEl.load();
  activeDept=null;
  showPanel(finished);
  refreshStates();
  return finished;
}
function stopPlayAllButton(){playAllMode=false;playAllBtn.classList.remove('is-playing');playAllBtn.textContent='▶ Play All';}
function activateDepartment(d){activeDept=d;showPanel(d);playAudio(d);refreshStates();}
function onBuildingClick(d){
  if(playAllMode)stopPlayAllButton();
  if(activeDept&&activeDept.id===d.id){completeActiveKeepPanel();return;}
  if(activeDept){completed.add(activeDept.id);audioEl.pause();activeDept=null;}
  activateDepartment(d);
}
function playAudio(d){audioEl.pause();audioEl.src=d.audio||'';audioEl.muted=muted;if(d.audio)audioEl.play().catch(()=>{});}
function markComplete(d){if(d){completed.add(d.id);refreshStates();}}
audioEl.addEventListener('ended',()=>{
  const finished=activeDept;
  if(finished)completed.add(finished.id);
  activeDept=null;
  if(playAllMode&&finished){
    refreshStates();
    const i=deptIndex(finished);
    if(i<DEPARTMENTS.length-1){
      setTimeout(()=>{
        if(playAllMode)activateDepartment(DEPARTMENTS[i+1]);
      },AUTOPLAY_GAP_MS);
    }else{stopPlayAllButton();showPanel(finished);refreshStates();}
  }else if(finished){showPanel(finished);refreshStates();}
});
playAllBtn.addEventListener('click',()=>{
  if(playAllMode){stopPlayAllButton();audioEl.pause();return;}
  playAllMode=true;playAllBtn.classList.add('is-playing');playAllBtn.textContent='❚❚ Playing';
  const start=activeDept||DEPARTMENTS.find(d=>!completed.has(d.id))||DEPARTMENTS[0];
  activateDepartment(start);
});
prevBtn.addEventListener('click',()=>{const focus=activeDept||panelDept;const i=deptIndex(focus);if(i>0){if(activeDept){completed.add(activeDept.id);audioEl.pause();activeDept=null;}activateDepartment(DEPARTMENTS[i-1]);}});
nextBtn.addEventListener('click',()=>{const focus=activeDept||panelDept;const i=deptIndex(focus);if(i>=0&&i<DEPARTMENTS.length-1){if(activeDept){completed.add(activeDept.id);audioEl.pause();activeDept=null;}activateDepartment(DEPARTMENTS[i+1]);}});
function muteIcon(){muteBtn.innerHTML=muted?'<svg viewBox="0 0 24 24"><polygon points="4,10 8,10 13,6 13,18 8,14 4,14"></polygon><line x1="18" y1="9" x2="22" y2="15"></line><line x1="22" y1="9" x2="18" y2="15"></line></svg>':'<svg viewBox="0 0 24 24"><polygon points="4,10 8,10 13,6 13,18 8,14 4,14"></polygon><path d="M16 9.5c1.2 1.4 1.2 3.6 0 5"></path><path d="M18.5 7c2.3 2.7 2.3 7.3 0 10"></path></svg>';} muteBtn.addEventListener('click',()=>{muted=!muted;audioEl.muted=muted;muteIcon();});
panel.addEventListener('click',e=>e.stopPropagation());
scene.addEventListener('click',e=>{
  if(panel.contains(e.target))return;
  if(activeDept)completeActiveKeepPanel();
});
function updateDebugPoint(e){const rect=scene.getBoundingClientRect();const x=((e.clientX-rect.left)/rect.width*100).toFixed(1),y=((e.clientY-rect.top)/rect.height*100).toFixed(1);debugReadout.textContent='x: '+x+'%, y: '+y+'%';debugDot.style.left=x+'%';debugDot.style.top=y+'%';lastDebugCode='"cx": '+x+',\n"cy": '+y+',\n"labelX": '+x+',\n"labelY": '+y+',\n"hitRx": 0,\n"hitRy": 0';}
function setupDebug(){if(!DEBUG_MODE)return;scene.classList.add('debug-on');scene.addEventListener('click',e=>{updateDebugPoint(e);},true);debugCopy.addEventListener('click',()=>{navigator.clipboard&&navigator.clipboard.writeText(lastDebugCode);debugCopy.textContent='Copied';setTimeout(()=>debugCopy.textContent='Copy coordinate code',900);});}
buildZones();muteIcon();showDefaultPanel();setupDebug();refreshStates();
</script></body></html>
